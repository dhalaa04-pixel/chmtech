<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وصلي | غليزان</title>
<style>
body{font-family:Cairo,Arial,sans-serif;padding:20px;background:#f5f5f5}
.btn{padding:12px;border:none;border-radius:10px;cursor:pointer}
.employee-card{padding:10px;margin:5px 0;background:#fff;border-radius:10px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:green}
</style>
</head>
<body>
<h2>🛵 وصلي</h2>

<select id="city" onchange="showEmployee()">
<option value="">اختر البلدية</option>
<option value="Oued Rhiou">وادي رهيو</option>
<option value="Relizane">غليزان</option>
<option value="Ammi Moussa">عمي موسى</option>
<option value="Yellel">يلل</option>
<option value="Zemmoura">زمورة</option>
<option value="Mazouna">مازونة</option>
</select>

<div id="employee"></div>

<select id="employeeSelect" onchange="selectEmployee()" style="display:none;">
<option value="">👤 اختر موظف التوصيل</option>
</select>

<script>
const employees={
"Oued Rhiou":[
{name:"محمد",phone:"213671111111"},
{name:"أحمد",phone:"213672222222"},
{name:"خالد",phone:"213673333333"}],
"Relizane":[
{name:"علي",phone:"213674444444"},
{name:"سامي",phone:"213675555555"},
{name:"يوسف",phone:"213676666666"}],
"Ammi Moussa":[
{name:"مراد",phone:"213677777777"},
{name:"إسماعيل",phone:"213678888888"},
{name:"عبد القادر",phone:"213679999999"}],
"Yellel":[
{name:"رياض",phone:"213661111111"},
{name:"أنور",phone:"213662222222"},
{name:"طارق",phone:"213663333333"}],
"Zemmoura":[
{name:"بشير",phone:"213664444444"},
{name:"حمزة",phone:"213665555555"},
{name:"محمود",phone:"213666666666"}],
"Mazouna":[
{name:"شعيب",phone:"213667777777"},
{name:"أيوب",phone:"213668888888"},
{name:"عبدالله",phone:"213669999999"}]
};
let currentPhone="";

function showEmployee(){
let city=document.getElementById("city").value;
let box=document.getElementById("employee");
let select=document.getElementById("employeeSelect");
box.innerHTML="";
select.innerHTML='<option value="">👤 اختر موظف التوصيل</option>';
if(employees[city]){
employees[city].forEach((emp,index)=>{
box.innerHTML+=`<div class="employee-card"><span class="dot"></span> ${emp.name}</div>`;
select.innerHTML+=`<option value="${index}">${emp.name}</option>`;
});
select.style.display="block";
}else{
select.style.display="none";
}
}
function selectEmployee(){
let city=document.getElementById("city").value;
let index=document.getElementById("employeeSelect").value;
if(index!==""){currentPhone=employees[city][index].phone;}
}
</script>
</body>
</html>
